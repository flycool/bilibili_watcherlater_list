<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bilibili Watch Later</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- Login Page -->
        <div id="login-page" class="page active">
            <div class="login-card">
                <h1><span>Bili</span> Watch Later</h1>
                <div class="sub">扫码登录B站账号</div>
                <div class="qr-wrap" id="qr-wrap">
                    <img
                        id="qr-img"
                        src=""
                        alt="QR Code"
                        style="display: none"
                    />
                    <div class="expired" id="qr-expired">
                        <span>二维码已过期</span>
                        <button
                            class="btn-refresh"
                            onclick="refreshQR()"
                            style="
                                height: 32px;
                                border-radius: 8px;
                                border: none;
                                background: var(--pink);
                                color: white;
                                padding: 0 16px;
                                cursor: pointer;
                                font-size: 12px;
                            "
                        >
                            刷新二维码
                        </button>
                    </div>
                </div>
                <div class="status-text" id="qr-status">正在生成二维码...</div>
            </div>
        </div>

        <!-- Main Page -->
        <div id="main-page" class="page">
            <!-- Top Bar -->
            <div class="topbar">
                <div class="logo"><span>稍后</span>再看</div>
                <div class="search-box">
                    <span class="icon">🔍</span>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="搜索标题或UP主..."
                    />
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="added">最近添加</option>
                    <option value="title">标题 A-Z</option>
                    <option value="author">UP主 A-Z</option>
                </select>
                <select class="sort-select" id="duration-select">
                    <option value="">全部时长</option>
                    <option value="under_10">10分钟以下</option>
                    <option value="10_30">10-30分钟</option>
                    <option value="30_60">30-60分钟</option>
                    <option value="over_60">60分钟以上</option>
                </select>
                <button class="btn btn-sync" onclick="doSync()">🔄 同步</button>
                <div class="spacer"></div>
                <span class="user-name" id="user-name-display"></span>
                <button class="btn btn-logout" onclick="doLogout()">
                    登出
                </button>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Sidebar -->
                <div class="sidebar">
                    <div class="stats">
                        <div class="stat">
                            <div class="num" id="stat-total">0</div>
                            <div class="lbl">稍后再看</div>
                        </div>
                        <div class="stat">
                            <div class="num" id="stat-watched">0</div>
                            <div class="lbl">已观看</div>
                        </div>
                        <div class="stat">
                            <div class="num" id="stat-tags">0</div>
                            <div class="lbl">标签</div>
                        </div>
                    </div>
                    <div class="tag-list" id="tag-list">
                        <div
                            class="tag-item active"
                            data-tag=""
                            onclick="selectTag(this, '')"
                        >
                            <span
                                class="dot"
                                style="background: var(--pink)"
                            ></span>
                            <span class="tag-name">全部</span>
                            <span class="count" id="count-all">0</span>
                        </div>
                    </div>
                    <div class="add-tag">
                        <input
                            type="text"
                            id="new-tag-name"
                            placeholder="新标签名称..."
                            maxlength="20"
                        />
                        <input
                            type="color"
                            id="new-tag-color"
                            value="#6c5ce7"
                            style="
                                width: 32px;
                                height: 32px;
                                padding: 2px;
                                border: 1px solid var(--border);
                                border-radius: 8px;
                                background: var(--surface);
                                cursor: pointer;
                            "
                        />
                        <button class="btn-add" onclick="createTag()">
                            ＋
                        </button>
                    </div>
                </div>

                <!-- Video Grid -->
                <div class="grid-area" id="grid-area">
                    <div class="grid" id="video-grid"></div>
                    <div class="load-more" id="load-more" style="display: none">
                        <button class="btn-load" onclick="loadMore()">
                            加载更多
                        </button>
                    </div>
                    <div
                        class="empty-state"
                        id="empty-state"
                        style="display: none"
                    >
                        <div class="icon">📭</div>
                        <div class="msg">还没有视频</div>
                        <div class="sub">
                            点击右上角「同步」从B站获取稍后再看列表
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Delete Confirm Modal -->
        <div class="modal-overlay" id="delete-modal">
            <div class="modal">
                <h3>确认删除</h3>
                <p
                    style="color: var(--text2); margin-bottom: 20px"
                    id="delete-modal-title"
                ></p>
                <div class="btn-row">
                    <button
                        class="btn btn-cancel"
                        onclick="closeModal('delete-modal')"
                    >
                        取消
                    </button>
                    <button class="btn btn-danger" id="delete-confirm-btn">
                        删除
                    </button>
                </div>
            </div>
        </div>

        <!-- Tag Assign Modal -->
        <div class="modal-overlay" id="tag-modal">
            <div class="modal">
                <h3>管理标签</h3>
                <p
                    style="
                        color: var(--text2);
                        margin-bottom: 4px;
                        font-size: 13px;
                    "
                    id="tag-modal-title"
                ></p>
                <div class="tag-select" id="tag-select-list"></div>
                <div class="btn-row">
                    <button
                        class="btn btn-cancel"
                        onclick="closeModal('tag-modal')"
                    >
                        关闭
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toast-container"></div>

        <!-- Eel -->
        <script type="text/javascript" src="/eel.js"></script>

        <!-- ui -->
        <script type="text/javascript" src="/mainui.js"></script>
    </body>
</html>
